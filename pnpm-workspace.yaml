# https://pnpm.io/settings

allowBuilds:
  '@parcel/watcher': true # Dependency of nitropack & nuxt, has `install` script
  esbuild: true # Dependency of nitropack & vite, has `postinstall` script
  unrs-resolver: true # Dependency of vite, has `install` script
  # Uncomment these if needed
  # fsevents: true # Dependency of vite, has `install` script
  # netlify: true # Dependency of nitropack, has `postinstall` script

minimumReleaseAge: 20160 # 14 days * 24 hours * 60 minutes

minimumReleaseAgeExclude:
  - flatted@3.4.2
  - brace-expansion@5.0.5
  - srvx@0.11.13
  - picomatch@4.0.4
  - node-forge@1.4.0
  - yaml@2.8.3
  - h3@1.15.9
  - serialize-javascript@7.0.5

overrides:
  brace-expansion@>=2.0.0 <=2.0.1: '>=2.0.2'
  brace-expansion@>=4.0.0 <5.0.5: '>=5.0.5'
  devalue@<5.6.4: '>=5.6.4'
  flatted@<=3.4.1: '>=3.4.2'
  glob@>=10.2.0 <10.5.0: '>=10.5.0'
  h3: '1.15.9'
  js-yaml@>=4.0.0 <4.1.1: '>=4.1.1'
  lodash-es@>=4.0.0 <=4.17.22: '>=4.17.23'
  lodash@>=4.0.0 <=4.17.22: '>=4.17.23'
  minimatch: '10.2.3'
  nanotar: '0.3.0'
  node-forge@<1.4.0: '>=1.4.0'
  picomatch@<2.3.2: '>=2.3.2'
  picomatch@>=4.0.0 <4.0.4: '>=4.0.4'
  qs@<6.14.1: '>=6.14.1'
  qs@>=6.7.0 <=6.14.1: '>=6.14.2'
  serialize-javascript@<7.0.5: '>=7.0.5'
  srvx@<0.11.13: '>=0.11.13'
  svgo@=4.0.0: '>=4.0.1'
  tar@<=7.5.9: '>=7.5.11'
  unhead@<=2.1.10: '>=2.1.11'
  yaml@>=2.0.0 <2.8.3: '>=2.8.3'
